<!doctype html>

    <link rel="stylesheet" href="./src/styles.css" />
    <style>
      .nf {
        max-width: 700px;
        margin: 0 auto;
        padding: clamp(3rem, 2rem + 5vw, 7rem) var(--gutter);
        display: grid;
        gap: 1.2rem;
        text-align: left;
      }
      .nf__idx {
        font-family: var(--f-mono);
        font-size: var(--t-xs);
        color: var(--muted);
        letter-spacing: 0.02em;
      }
      .nf__code {
        font-family: var(--f-sans);
        font-weight: 800;
        font-size: clamp(4rem, 3rem + 6vw, 8rem);
        line-height: 0.9;
        letter-spacing: -0.06em;
        color: var(--ink);
      }
      .nf__title {
        font-family: var(--f-sans);
        font-weight: 700;
        font-size: var(--t-2xl);
        letter-spacing: -0.03em;
        color: var(--ink);
      }
      .nf__desc {
        color: var(--ink-2);
        font-size: var(--t-lg);
        line-height: 1.55;
        max-width: 52ch;
      }
      .nf__cta {
        display: flex;
        gap: clamp(1rem, .5rem + 1.5vw, 2rem);
        margin-top: .6rem;
        font-family: var(--f-mono);
        font-size: var(--t-sm);
